<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open Testing Service (OTS) Typing Test </title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

#paragraph{
    border:1px solid #ccc;
    padding:15px;
    font-size:22px;
    line-height:35px;
    height:250px;
    overflow-y:auto;
    background:#fafafa;
}

.correct{
    color:green;
}

.wrong{
    color:red;
    background:#ffd6d6;
}

.current{
    background:yellow;
}

textarea{
    width:100%;
    height:180px;
    margin-top:15px;
    font-size:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Open Testing Service (OTS) Typing Test</h1>

<label>Candidate Name</label>

<input type="text"
id="name"
style="width:100%;padding:10px;">

<br><br>

<p>
<b>Time Left:</b>
<span id="timer">60</span> sec
</p>

<div id="paragraph"></div>

<br>

<button onclick="startTest()">
Start Test
</button>

<textarea
id="typingArea"
disabled
placeholder="Start typing here...">
</textarea>

<div id="result"></div>

</div>

<script>

const text =
`Technology has become an essential part of modern life and influences the way people work, communicate, and learn. From smartphones and computers to online services and artificial intelligence, technology has transformed daily activities and made many tasks easier and faster. Students can access educational resources from anywhere in the world, employees can work remotely, and businesses can reach customers through digital platforms. `;

const paragraph =
document.getElementById("paragraph");

text.split("").forEach(char => {

const span =
document.createElement("span");

span.innerText = char;

paragraph.appendChild(span);

});

const chars =
paragraph.querySelectorAll("span");

chars[0].classList.add("current");

let timer;
let time = 60;

function startTest(){

if(document.getElementById("name").value==""){

alert("Enter Candidate Name");
return;

}

document.getElementById("typingArea").disabled=false;
document.getElementById("typingArea").focus();

timer=setInterval(()=>{

time--;

document.getElementById("timer").innerText=time;

if(time<=0){

clearInterval(timer);
finishTest();

}

},1000);

}

document
.getElementById("typingArea")
.addEventListener("input",function(){

const typed =
this.value.split("");

chars.forEach(c=>{

c.classList.remove(
"correct",
"wrong",
"current"
);

});

let correctCount=0;

chars.forEach((char,index)=>{

if(typed[index]==null){

}

else if(
typed[index]===char.innerText
){

char.classList.add("correct");
correctCount++;

}

else{

char.classList.add("wrong");

}

});

if(chars[typed.length]){

chars[typed.length]
.classList.add("current");

chars[typed.length]
.scrollIntoView({
behavior:"smooth",
block:"center"
});

}

});

function finishTest(){

document.getElementById(
"typingArea"
).disabled=true;

const typed =
document.getElementById(
"typingArea"
).value;

let correct=0;

chars.forEach(char=>{

if(
char.classList.contains(
"correct"
)
){
correct++;
}

});

let accuracy =
(correct/text.length)*80;

let words =
typed.trim()
.split(/\s+/)
.length;

document.getElementById(
"result"
).innerHTML =

"Candidate: "
+document.getElementById("name").value+

"<br>WPM: "
+words+

"<br>Accuracy: "
+accuracy.toFixed(2)+"%";

}

</script>

</body>
</html>
